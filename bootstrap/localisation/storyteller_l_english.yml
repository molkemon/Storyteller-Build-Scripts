l_english:
    storyteller_play_tt:0 "This button starts narration of the currently open event.\n\nIf you close the event, this button will disappear. You can also use a hotkey while an event is open (default v - but you can rebind it as usual).\n\nIf multiple events popped at the same time, only the one that technically popped last will be narrated.\n\nYou can close the event once narration has started and it will still continue playing.\n\nYou cannot stop narration once started.\n\nIf you start another narration while one is still playing, they will talk over each other.\n_____________"